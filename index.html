<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a1628">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>HaggleHelper</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a1628 0%, #1a2942 100%);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 1rem;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1.5rem 0;
        }

        .logo {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #ff6b35, #ffd23f);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 1.25rem;
            margin-bottom: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .location-section {
            margin-bottom: 1rem;
        }

        .location-section label {
            display: block;
            font-size: 0.9rem;
            color: #a8b8d8;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .location-section input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 0.875rem;
            font-size: 1rem;
            color: white;
            outline: none;
        }

        .location-section input:focus {
            border-color: #ff6b35;
        }

        .camera-btn {
            width: 100%;
            background: linear-gradient(135deg, #ff6b35, #ffd23f);
            border: none;
            border-radius: 12px;
            padding: 1.25rem;
            font-size: 1rem;
            font-weight: 600;
            color: #0a1628;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .camera-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .preview-img {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 1rem;
        }

        .loading {
            text-align: center;
            padding: 2rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #ff6b35;
            border-radius: 50%;
            margin: 0 auto 1rem;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .result {
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result h2 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .result p {
            color: #a8b8d8;
            margin-bottom: 1rem;
            line-height: 1.5;
        }

        .price-box {
            background: linear-gradient(135deg, rgba(255, 107, 53, 0.15), rgba(255, 210, 63, 0.15));
            border-radius: 12px;
            padding: 1.25rem;
            margin-bottom: 1rem;
            border: 1px solid rgba(255, 107, 53, 0.3);
        }

        .price-box .label {
            font-size: 0.9rem;
            color: #a8b8d8;
            margin-bottom: 0.5rem;
        }

        .price-box .price {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .price-box .suggestion {
            color: #ffd23f;
            font-weight: 600;
        }

        .tips {
            margin-top: 1rem;
        }

        .tips h3 {
            font-size: 1.1rem;
            margin-bottom: 0.75rem;
        }

        .tip-item {
            background: rgba(255, 255, 255, 0.03);
            padding: 0.875rem;
            border-radius: 10px;
            margin-bottom: 0.5rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            line-height: 1.5;
        }

        .error {
            background: rgba(248, 113, 113, 0.15);
            border: 1px solid rgba(248, 113, 113, 0.3);
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1rem;
        }

        .hidden {
            display: none;
        }

        #cameraInput {
            display: none;
        }

        .confidence {
            display: inline-block;
            padding: 0.35rem 0.75rem;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-left: 0.5rem;
        }

        .confidence-high {
            background: #4ade80;
            color: #0a1628;
        }

        .confidence-medium {
            background: #facc15;
            color: #0a1628;
        }

        .confidence-low {
            background: #f87171;
            color: white;
        }

        .leaderboard-tab.active {
            background: linear-gradient(135deg, #ff6b35, #ffd23f) !important;
            color: #0a1628 !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">💰</div>
            <h1>HaggleHelper</h1>
            <button id="leaderboardBtn" style="margin-left: auto; background: rgba(255, 255, 255, 0.1); border: none; padding: 0.5rem 1rem; border-radius: 8px; color: white; cursor: pointer; font-weight: 600;">
                🏆
            </button>
        </div>

        <div class="card location-section">
            <label>📍 Your Location</label>
            <input type="text" id="locationInput" placeholder="Enter location (e.g., Hanoi, Vietnam)">
            <div id="locationError" style="display: none; color: #f87171; font-size: 0.85rem; margin-top: 0.5rem;"></div>
        </div>

        <!-- Admin Mode Toggle (Hidden by default) -->
        <div id="adminToggle" class="card" style="display: none; background: rgba(255, 107, 53, 0.1); border: 1px solid rgba(255, 107, 53, 0.3);">
            <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                <input type="checkbox" id="adminMode" style="width: 20px; height: 20px;">
                <span style="font-weight: 600; color: #ffd23f;">🔑 Admin Mode (Your Data = Gold Standard)</span>
            </label>
        </div>

        <button class="camera-btn" id="cameraBtn">
            📸 Scan Item
        </button>

        <input type="file" id="cameraInput" accept="image/*" capture="environment">

        <div id="loading" class="hidden">
            <div class="loading">
                <div class="spinner"></div>
                <p>Analyzing...</p>
            </div>
        </div>

        <div id="error" class="hidden card error"></div>

        <!-- Fullscreen Results Overlay -->
        <div id="resultOverlay" class="hidden" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 1000; background: black;">
            <img id="resultImg" style="width: 100%; height: 100%; object-fit: cover; display: block;" alt="Item">
            <div style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(to bottom, rgba(0, 0, 0, 0) 0%, rgba(0, 0, 0, 0.3) 30%, rgba(0, 0, 0, 0.85) 70%, rgba(0, 0, 0, 0.98) 100%);"></div>
            
            <div id="resultCard" style="position: absolute; bottom: 0; left: 0; right: 0; padding: 1.5rem 1.5rem calc(env(safe-area-inset-bottom) + 1.5rem) 1.5rem;">
                <!-- Text floats directly on photo - no card background -->
            </div>
        </div>

        <!-- Submission Success Feedback -->
        <div id="submissionFeedback" class="hidden card" style="background: linear-gradient(135deg, rgba(74, 222, 128, 0.15), rgba(34, 197, 94, 0.15)); border: 1px solid rgba(74, 222, 128, 0.3); text-align: center;">
            <div style="font-size: 2.5rem; margin-bottom: 0.5rem;">🎉</div>
            <div id="feedbackContent"></div>
            <button id="viewLeaderboardBtn" style="margin-top: 1rem; width: 100%; background: linear-gradient(135deg, #ff6b35, #ffd23f); border: none; padding: 0.875rem; border-radius: 10px; color: #0a1628; cursor: pointer; font-size: 0.95rem; font-weight: 700;">
                🏆 See Leaderboard
            </button>
        </div>

        <!-- Leaderboard Modal -->
        <div id="leaderboardModal" class="hidden" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.9); z-index: 2000; overflow-y: auto;">
            <div class="container" style="padding-top: 2rem; padding-bottom: 2rem;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <h2 style="font-size: 1.5rem; font-weight: 700;">🏆 Leaderboards</h2>
                    <button id="closeLeaderboard" style="background: rgba(255, 255, 255, 0.1); border: none; width: 40px; height: 40px; border-radius: 50%; color: white; cursor: pointer; font-size: 1.2rem;">✕</button>
                </div>

                <!-- Tabs -->
                <div style="display: flex; gap: 0.5rem; margin-bottom: 1.5rem;">
                    <button id="tabVolume" class="leaderboard-tab active" data-tab="volume" style="flex: 1; background: linear-gradient(135deg, #ff6b35, #ffd23f); border: none; padding: 0.75rem; border-radius: 10px; color: #0a1628; cursor: pointer; font-weight: 700;">
                        📊 Most Active
                    </button>
                    <button id="tabDeals" class="leaderboard-tab" data-tab="deals" style="flex: 1; background: rgba(255, 255, 255, 0.1); border: none; padding: 0.75rem; border-radius: 10px; color: white; cursor: pointer; font-weight: 700;">
                        💎 Best Deals
                    </button>
                </div>

                <!-- Leaderboard Content -->
                <div id="leaderboardContent"></div>
            </div>
        </div>
    </div>

    <script type="module">

        const firebaseConfig = {

        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const WEATHER_API_KEY = '2488906fe53818caebc5941b77e4b546';
        
        let currentLocation = '';
        let capturedImage = null;
        let currentItemData = null;
        let currentCoords = null;
        let userId = getUserId();
        let adminMode = false;
        let logoTapCount = 0;
        let logoTapTimer = null;

        // Fake leaders for early adoption
        const fakeLeaders = [
            { id: 'fake_1', name: 'BackpackerMike', count: 47, avgSavings: -38, badge: '🌏', isFake: true },
            { id: 'fake_2', name: 'HanoiHunter', count: 32, avgSavings: -52, badge: '🎯', isFake: true },
            { id: 'fake_3', name: 'BudgetTraveler', count: 28, avgSavings: -29, badge: '💰', isFake: true },
            { id: 'fake_4', name: 'MarketMaven', count: 23, avgSavings: -45, badge: '🛍️', isFake: true },
            { id: 'fake_5', name: 'DealSeeker', count: 19, avgSavings: -41, badge: '🔍', isFake: true },
            { id: 'fake_6', name: 'PriceWatcher', count: 16, avgSavings: -33, badge: '👀', isFake: true },
            { id: 'fake_7', name: 'SavvyShopper', count: 14, avgSavings: -48, badge: '🧠', isFake: true },
            { id: 'fake_8', name: 'Nomad_Sarah', count: 11, avgSavings: -36, badge: '✈️', isFake: true },
            { id: 'fake_9', name: 'DealMaster', count: 9, avgSavings: -67, badge: '👑', isFake: true },
            { id: 'fake_10', name: 'NewScout', count: 7, avgSavings: -25, badge: '🆕', isFake: true }
        ];

        // Generate or retrieve persistent anonymous user ID
        function getUserId() {
            let id = localStorage.getItem('haggle_user_id');
            if (!id) {
                id = 'user_' + Math.random().toString(36).substr(2, 9) + Date.now().toString(36);
                localStorage.setItem('haggle_user_id', id);
            }
            return id;
        }

        // Simple hash function for photo deduplication
        function simpleHash(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return Math.abs(hash).toString(36);
        }

        // Admin mode activation - triple tap on logo
        document.querySelector('.logo').addEventListener('click', () => {
            logoTapCount++;
            
            if (logoTapTimer) clearTimeout(logoTapTimer);
            
            logoTapTimer = setTimeout(() => {
                if (logoTapCount >= 3) {
                    document.getElementById('adminToggle').style.display = 'block';
                    console.log('Admin mode toggle enabled');
                }
                logoTapCount = 0;
            }, 500);
        });

        // Track admin mode checkbox
        document.getElementById('adminMode').addEventListener('change', (e) => {
            adminMode = e.target.checked;
            console.log('Admin mode:', adminMode ? 'ON' : 'OFF');
        });

        // Compress image before sending to API
        async function compressImage(base64Data) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const maxW = 800, maxH = 600;
                    let w = img.width, h = img.height;
                    
                    if (w > maxW) { h *= maxW / w; w = maxW; }
                    if (h > maxH) { w *= maxH / h; h = maxH; }
                    
                    canvas.width = w;
                    canvas.height = h;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, w, h);
                    
                    resolve(canvas.toDataURL('image/jpeg', 0.6).split(',')[1]);
                };
                img.src = 'data:image/jpeg;base64,' + base64Data;
            });
        }

        // Get weather data
        async function getWeather(lat, lon) {
            try {
                const response = await fetch(
                    `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${WEATHER_API_KEY}&units=metric`
                );
                const data = await response.json();
                return {
                    condition: data.weather[0].main,
                    temperature: Math.round(data.main.temp),
                    humidity: data.main.humidity
                };
            } catch (error) {
                console.error('Weather fetch failed:', error);
                return null;
            }
        }

        // Check cache before API call
        function getCachedResult(photoHash, location) {
            const cacheKey = `cache_${photoHash}_${location}`;
            const cached = localStorage.getItem(cacheKey);
            
            if (cached) {
                const { result, timestamp } = JSON.parse(cached);
                const sevenDays = 7 * 24 * 60 * 60 * 1000;
                if (Date.now() - timestamp < sevenDays) {
                    console.log('Using cached result');
                    return result;
                }
            }
            return null;
        }

        function setCachedResult(photoHash, location, result) {
            const cacheKey = `cache_${photoHash}_${location}`;
            localStorage.setItem(cacheKey, JSON.stringify({
                result,
                timestamp: Date.now()
            }));
        }

        // Get user location
        if (navigator.geolocation) {
            document.getElementById('locationInput').value = 'Detecting location...';
            
            console.log('Requesting geolocation...');
            
            navigator.geolocation.getCurrentPosition(
                async (position) => {
                    console.log('Geolocation success:', position);
                    const { latitude, longitude } = position.coords;
                    currentCoords = { lat: latitude, lon: longitude };
                    
                    try {
                        console.log('Fetching city name from coordinates...');
                        const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`);
                        const data = await response.json();
                        console.log('Reverse geocoding result:', data);
                        
                        const city = data.address.city || data.address.town || data.address.village || data.address.county || '';
                        const country = data.address.country || '';
                        currentLocation = `${city}, ${country}`.replace(/^,\s*/, '').trim();
                        
                        if (currentLocation) {
                            document.getElementById('locationInput').value = currentLocation;
                            console.log('Location set to:', currentLocation);
                        } else {
                            document.getElementById('locationInput').value = 'Location detected';
                            currentLocation = 'current location';
                        }
                        document.getElementById('locationError').style.display = 'none';
                    } catch (error) {
                        console.error('Reverse geocoding error:', error);
                        document.getElementById('locationInput').value = 'Location detected';
                        currentLocation = 'current location';
                    }
                },
                (error) => {
                    console.error('Geolocation error:', error);
                    console.error('Error code:', error.code);
                    console.error('Error message:', error.message);
                    
                    const errorDiv = document.getElementById('locationError');
                    
                    if (error.code === error.PERMISSION_DENIED) {
                        errorDiv.textContent = '⚠️ Location denied. Check browser settings → Site permissions → Location';
                        console.log('Location permission denied - check browser settings');
                    } else if (error.code === error.POSITION_UNAVAILABLE) {
                        errorDiv.textContent = '⚠️ Location unavailable. Enable GPS or enter manually.';
                        console.log('Position unavailable - GPS may be off');
                    } else if (error.code === error.TIMEOUT) {
                        errorDiv.textContent = '⚠️ Location timeout. Enter manually or try again.';
                        console.log('Location request timed out');
                    } else {
                        errorDiv.textContent = '⚠️ Location error. Enter manually.';
                    }
                    
                    errorDiv.style.display = 'block';
                    document.getElementById('locationInput').removeAttribute('readonly');
                    document.getElementById('locationInput').value = '';
                    document.getElementById('locationInput').placeholder = 'Enter location (e.g., Hanoi, Vietnam)';
                },
                {
                    enableHighAccuracy: true,
                    timeout: 15000, // Increased to 15 seconds
                    maximumAge: 300000
                }
            );
        } else {
            console.error('Geolocation not supported by browser');
            document.getElementById('locationInput').placeholder = 'Enter location (e.g., Hanoi, Vietnam)';
            document.getElementById('locationInput').removeAttribute('readonly');
            document.getElementById('locationError').textContent = '⚠️ Geolocation not supported. Please enter manually.';
            document.getElementById('locationError').style.display = 'block';
        }

        // Camera button
        document.getElementById('cameraBtn').addEventListener('click', () => {
            document.getElementById('cameraInput').click();
        });

        // Handle image capture
        document.getElementById('cameraInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (event) => {
                capturedImage = event.target.result;
                
                // Hide any previous results
                document.getElementById('resultOverlay').classList.add('hidden');
                document.getElementById('submissionFeedback').classList.add('hidden');
                
                // Analyze
                await analyzeItem(capturedImage);
            };
            reader.readAsDataURL(file);
        });

        async function analyzeItem(imageData) {
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('error').classList.add('hidden');
            document.getElementById('resultOverlay').classList.add('hidden');

            const location = document.getElementById('locationInput').value || 'this area';

            try {
                // Create photo hash for caching/deduplication
                const photoHash = simpleHash(imageData.substring(0, 1000));
                
                // CACHING DISABLED - was showing wrong results
                // const cachedResult = getCachedResult(photoHash, location);
                // if (cachedResult) {
                //     displayResult(cachedResult);
                //     document.getElementById('loading').classList.add('hidden');
                //     return;
                // }
                
                // Compress image before sending (60% savings)
                const base64Data = imageData.split(',')[1];
                const compressedData = await compressImage(base64Data);
                
                console.log(`Image compressed: ${base64Data.length} -> ${compressedData.length} bytes (${Math.round((1 - compressedData.length/base64Data.length) * 100)}% reduction)`);
                
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        image: compressedData,
                        location: location
                    })
                });

                if (!response.ok) {
                    throw new Error('Analysis failed');
                }

                const result = await response.json();
                
                // CACHING DISABLED
                // setCachedResult(photoHash, location, result);
                
                // Store photo hash for submission
                result._photoHash = photoHash;
                
                displayResult(result);

            } catch (error) {
                showError('Could not analyze image. Please try again.');
            } finally {
                document.getElementById('loading').classList.add('hidden');
            }
        }

        function displayResult(data) {
            currentItemData = data;
            
            // Show fullscreen photo overlay
            document.getElementById('resultImg').src = capturedImage;
            document.getElementById('resultOverlay').classList.remove('hidden');
            
            // Build floating text (no card background)
            const card = document.getElementById('resultCard');
            
            // Item name + confidence - with text shadow for readability
            let html = `
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                    <h2 style="margin: 0; font-size: 1.5rem; font-weight: 700; text-shadow: 0 2px 8px rgba(0,0,0,0.8);">${data.item}</h2>
                    <span class="confidence confidence-${data.confidence}" style="font-size: 0.65rem; padding: 0.35rem 0.65rem;">${data.confidence}</span>
                </div>
            `;
            
            // Price - BIG and prominent, with strong background
            if (data.priceRange) {
                html += `
                    <div style="background: rgba(255, 107, 53, 0.25); backdrop-filter: blur(12px); padding: 1rem; border-radius: 12px; margin-bottom: 1rem; border: 1px solid rgba(255, 107, 53, 0.5);">
                        <div style="font-size: 0.8rem; color: rgba(255,255,255,0.7); margin-bottom: 0.3rem; text-shadow: 0 1px 3px rgba(0,0,0,0.5);">Fair price</div>
                        <div style="font-size: 2rem; font-weight: 700; color: #ffd23f; text-shadow: 0 2px 8px rgba(0,0,0,0.8);">${data.priceRange.currency} ${data.priceRange.min}-${data.priceRange.max}</div>
                        ${data.suggestedStartingOffer ? `<div style="font-size: 0.9rem; color: rgba(255,255,255,0.8); margin-top: 0.3rem; text-shadow: 0 1px 3px rgba(0,0,0,0.5);">Start at ${data.priceRange.currency} ${data.suggestedStartingOffer}</div>` : ''}
                    </div>
                `;
            }
            
            // Tips - SHORT and punchy with shadows
            if (data.hagglingTips && data.hagglingTips.length > 0) {
                const shortTips = data.hagglingTips.slice(0, 2).map(tip => {
                    if (tip.length > 50) {
                        const firstSentence = tip.split(/[.!?]/)[0];
                        return firstSentence.length < 60 ? firstSentence : tip.substring(0, 47) + '...';
                    }
                    return tip;
                });
                
                html += `
                    <div style="margin-bottom: 1rem;">
                        ${shortTips.map(tip => `
                            <div style="font-size: 0.9rem; padding: 0.5rem 0; color: rgba(255,255,255,0.9); line-height: 1.4; text-shadow: 0 1px 4px rgba(0,0,0,0.8);">
                                • ${tip}
                            </div>
                        `).join('')}
                    </div>
                `;
            }
            
            // Price submission - compact with backdrop
            html += `
                <div style="background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(12px); border-radius: 12px; padding: 1rem; border: 1px solid rgba(255, 255, 255, 0.1);">
                    <div style="font-size: 0.85rem; color: rgba(255,255,255,0.8); margin-bottom: 0.6rem; text-shadow: 0 1px 3px rgba(0,0,0,0.8);">What did you pay?</div>
                    <div style="display: flex; gap: 0.6rem; margin-bottom: 0.6rem;">
                        <input type="number" id="pricePaid" placeholder="Amount" style="flex: 1; background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255, 255, 255, 0.25); border-radius: 10px; padding: 0.75rem; font-size: 1rem; color: white; outline: none; font-weight: 500;">
                        <select id="currencyPaid" style="background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255, 255, 255, 0.25); border-radius: 10px; padding: 0.75rem; font-size: 1rem; color: white; outline: none; min-width: 90px; font-weight: 500;">
                            <option value="VND">VND</option>
                            <option value="USD">USD</option>
                            <option value="THB">THB</option>
                            <option value="EUR">EUR</option>
                        </select>
                    </div>
                    <div style="display: flex; gap: 0.6rem;">
                        <button id="skipSubmit" style="flex: 1; background: rgba(255, 255, 255, 0.15); border: none; padding: 0.75rem; border-radius: 10px; color: rgba(255, 255, 255, 0.7); cursor: pointer; font-size: 0.9rem; font-weight: 600;">
                            Skip
                        </button>
                        <button id="submitPrice" style="flex: 1; background: linear-gradient(135deg, #ff6b35, #ffd23f); border: none; padding: 0.75rem; border-radius: 10px; color: #0a1628; cursor: pointer; font-size: 0.9rem; font-weight: 700; box-shadow: 0 4px 12px rgba(255, 107, 53, 0.4);">
                            Submit
                        </button>
                    </div>
                </div>
            `;
            
            card.innerHTML = html;
            
            // Set currency default
            if (data.priceRange && data.priceRange.currency) {
                const currencySelect = document.getElementById('currencyPaid');
                if (currencySelect) {
                    const currencies = Array.from(currencySelect.options).map(o => o.value);
                    if (currencies.includes(data.priceRange.currency)) {
                        currencySelect.value = data.priceRange.currency;
                    }
                }
            }
            
            // Reattach event listeners
            document.getElementById('submitPrice').addEventListener('click', handleSubmitPrice);
            document.getElementById('skipSubmit').addEventListener('click', handleSkipSubmit);
        }

        // Price submission handlers (extracted so they can be reattached)
        async function handleSubmitPrice() {
            const pricePaid = document.getElementById('pricePaid').value;
            const currency = document.getElementById('currencyPaid').value;
            
            if (!pricePaid || pricePaid <= 0) {
                alert('Please enter the price you paid');
                return;
            }
            
            const userPrice = parseFloat(pricePaid);
            
            // Calculate estimatedMid BEFORE using it
            const estimatedMid = currentItemData.priceRange 
                ? (currentItemData.priceRange.min + currentItemData.priceRange.max) / 2 
                : userPrice;
            
            // Save to Firebase
            try {
                const now = new Date();
                const hour = now.getHours();
                let timeOfDay = 'morning';
                if (hour >= 12 && hour < 17) timeOfDay = 'afternoon';
                else if (hour >= 17) timeOfDay = 'evening';
                
                const dayOfWeek = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'][now.getDay()];
                
                // Get weather if we have coordinates
                let weather = null;
                if (currentCoords) {
                    weather = await getWeather(currentCoords.lat, currentCoords.lon);
                }
                
                // Get user's total submissions count
                const userSubmissionsQuery = query(
                    collection(db, 'price_submissions'),
                    where('user_id', '==', userId)
                );
                const userSubmissionsSnapshot = await getDocs(userSubmissionsQuery);
                const userSubmissionCount = userSubmissionsSnapshot.size;
                
                // Prepare submission data
                const submission = {
                    // Core data
                    timestamp: now.toISOString(),
                    
                    // Item (from AI)
                    item_name: currentItemData.item,
                    item_description: currentItemData.description || '',
                    item_category: 'general', // Could enhance this later
                    
                    // Price
                    price_paid: userPrice,
                    currency: currency,
                    
                    // AI estimate
                    estimated_min: currentItemData.priceRange?.min || null,
                    estimated_max: currentItemData.priceRange?.max || null,
                    estimated_start: currentItemData.suggestedStartingOffer || null,
                    ai_confidence: currentItemData.confidence || 'unknown',
                    
                    // Data Quality & Source
                    data_source: adminMode ? 'admin' : 'user',
                    data_tier: adminMode ? 'gold' : 'unverified',
                    verification_method: adminMode ? 'trusted_collector' : 'none',
                    
                    // Outlier Detection
                    price_vs_estimate_percent: currentItemData.priceRange 
                        ? Math.round(((userPrice - estimatedMid) / estimatedMid) * 100)
                        : null,
                    is_outlier: currentItemData.priceRange 
                        ? (userPrice < estimatedMid * 0.3 || userPrice > estimatedMid * 3)
                        : false,
                    
                    // Location (rounded for privacy)
                    location_city: currentLocation,
                    latitude: currentCoords ? Math.round(currentCoords.lat * 100) / 100 : null,
                    longitude: currentCoords ? Math.round(currentCoords.lon * 100) / 100 : null,
                    
                    // Context
                    time_of_day: timeOfDay,
                    day_of_week: dayOfWeek,
                    weather_condition: weather?.condition || null,
                    temperature_c: weather?.temperature || null,
                    
                    // User
                    user_id: userId,
                    user_total_submissions: userSubmissionCount + 1,
                    
                    // Photo hash (for deduplication, not full photo)
                    photo_hash: currentItemData._photoHash || null
                };
                
                await addDoc(collection(db, 'price_submissions'), submission);
                console.log('Submission saved to Firebase:', submission);
                
            } catch (error) {
                console.error('Error saving to Firebase:', error);
                console.error('Error details:', error.code, error.message);
                
                // SHOW ERROR TO USER
                alert(`❌ FIREBASE ERROR!\n\n${error.message}\n\nMost likely: Firestore rules are blocking writes.\n\nGo to Firebase Console → Firestore → Rules tab\nChange to: allow read, write: if true;`);
                
                // Don't continue - user needs to fix this
                return;
            }
            
            // Hide the overlay
            document.getElementById('resultOverlay').classList.add('hidden');
            
            // Show feedback
            const feedbackDiv = document.getElementById('submissionFeedback');
            const feedbackContent = document.getElementById('feedbackContent');
            
            // Calculate performance (estimatedMid already calculated above)
            const percentDiff = ((userPrice - estimatedMid) / estimatedMid * 100).toFixed(0);
            
            let performanceText = '';
            let emoji = '';
            
            if (percentDiff < -10) {
                emoji = '🎯';
                performanceText = `<p style="font-size: 1.1rem; margin: 0.5rem 0;"><strong>Great deal!</strong> ${Math.abs(percentDiff)}% below estimate</p>`;
            } else if (percentDiff < 10) {
                emoji = '✅';
                performanceText = `<p style="font-size: 1.1rem; margin: 0.5rem 0;"><strong>Fair price!</strong></p>`;
            } else {
                emoji = '💪';
                performanceText = `<p style="font-size: 1.1rem; margin: 0.5rem 0;"><strong>Thanks!</strong> This helps others</p>`;
            }
            
            feedbackContent.innerHTML = `
                <div style="font-size: 2.5rem; margin-bottom: 0.5rem;">${emoji}</div>
                ${performanceText}
                <div style="margin: 1rem 0; padding: 1rem; background: rgba(255, 255, 255, 0.05); border-radius: 10px;">
                    <div style="font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 0.3rem;">
                        ${adminMode ? '🔑 Admin Data: Gold Standard' : '📊 Data Tier: Unverified'}
                    </div>
                    <div style="font-size: 1.1rem; font-weight: 700; color: #4ade80;">
                        ✅ Saved Successfully!
                    </div>
                </div>
                <p style="font-size: 0.85rem; color: var(--text-secondary); margin: 0;">
                    Thanks for contributing! 🙏
                </p>
            `;
            
            feedbackDiv.classList.remove('hidden');
            setTimeout(() => {
                feedbackDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 100);
        }

        function handleSkipSubmit() {
            document.getElementById('resultOverlay').classList.add('hidden');
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.classList.remove('hidden');
        }

        // Leaderboard functionality
        async function loadLeaderboard(type = 'volume') {
            try {
                // Get all real user submissions
                const allSubmissions = await getDocs(collection(db, 'price_submissions'));
                
                // Calculate stats per user
                const userStats = {};
                
                allSubmissions.forEach(doc => {
                    const data = doc.data();
                    const uid = data.user_id;
                    
                    if (!userStats[uid]) {
                        userStats[uid] = {
                            id: uid,
                            name: uid === userId ? 'YOU' : `User ${uid.substring(5, 9)}`,
                            count: 0,
                            totalSavings: 0,
                            validSavings: 0,
                            isFake: false
                        };
                    }
                    
                    userStats[uid].count++;
                    
                    // Calculate savings if we have estimate
                    if (data.estimated_min && data.estimated_max && data.price_paid) {
                        const estimatedMid = (data.estimated_min + data.estimated_max) / 2;
                        const savingsPercent = ((data.price_paid - estimatedMid) / estimatedMid) * 100;
                        userStats[uid].totalSavings += savingsPercent;
                        userStats[uid].validSavings++;
                    }
                });
                
                // Calculate average savings
                Object.values(userStats).forEach(user => {
                    user.avgSavings = user.validSavings > 0 
                        ? Math.round(user.totalSavings / user.validSavings)
                        : 0;
                    user.badge = '📊';
                });
                
                // Combine real users with fake leaders
                let allUsers = [...Object.values(userStats), ...fakeLeaders];
                
                // Sort based on type
                if (type === 'volume') {
                    allUsers.sort((a, b) => b.count - a.count);
                } else {
                    allUsers.sort((a, b) => a.avgSavings - b.avgSavings); // More negative = better
                }
                
                // Add ranks
                allUsers = allUsers.map((user, index) => ({
                    ...user,
                    rank: index + 1
                }));
                
                // Display
                displayLeaderboard(allUsers, type);
                
            } catch (error) {
                console.error('Error loading leaderboard:', error);
                document.getElementById('leaderboardContent').innerHTML = `
                    <div style="text-align: center; padding: 2rem; color: var(--text-secondary);">
                        <p>Could not load leaderboard</p>
                        <p style="font-size: 0.85rem; margin-top: 0.5rem;">${error.message}</p>
                    </div>
                `;
            }
        }

        function displayLeaderboard(users, type) {
            const yourUser = users.find(u => u.name === 'YOU');
            const top10 = users.slice(0, 10);
            
            let html = '<div style="display: flex; flex-direction: column; gap: 0.75rem;">';
            
            top10.forEach((user, index) => {
                const isYou = user.name === 'YOU';
                const rankEmoji = index === 0 ? '👑' : index === 1 ? '🥈' : index === 2 ? '🥉' : `${index + 1}.`;
                
                const displayValue = type === 'volume' 
                    ? `${user.count} items`
                    : `${user.avgSavings}% avg`;
                
                html += `
                    <div style="background: ${isYou ? 'rgba(255, 107, 53, 0.15)' : 'rgba(255, 255, 255, 0.05)'}; border: 1px solid ${isYou ? 'rgba(255, 107, 53, 0.3)' : 'rgba(255, 255, 255, 0.1)'}; border-radius: 12px; padding: 1rem; display: flex; align-items: center; gap: 1rem;">
                        <div style="font-size: 1.2rem; min-width: 40px;">${rankEmoji}</div>
                        <div style="flex: 1;">
                            <div style="font-weight: 700; font-size: 1rem;">${isYou ? '🔥 ' : ''}${user.name}${user.isFake ? '' : ''}</div>
                            <div style="font-size: 0.85rem; color: var(--text-secondary);">${user.badge} ${displayValue}</div>
                        </div>
                        ${isYou ? '<div style="font-size: 1.5rem;">⬆️</div>' : ''}
                    </div>
                `;
            });
            
            // Show YOUR rank if not in top 10
            if (yourUser && yourUser.rank > 10) {
                html += `
                    <div style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid rgba(255, 255, 255, 0.1);">
                        <div style="background: rgba(255, 107, 53, 0.15); border: 1px solid rgba(255, 107, 53, 0.3); border-radius: 12px; padding: 1rem; display: flex; align-items: center; gap: 1rem;">
                            <div style="font-size: 1.2rem; min-width: 40px;">${yourUser.rank}.</div>
                            <div style="flex: 1;">
                                <div style="font-weight: 700; font-size: 1rem;">🔥 YOU</div>
                                <div style="font-size: 0.85rem; color: var(--text-secondary);">${yourUser.badge} ${type === 'volume' ? `${yourUser.count} items` : `${yourUser.avgSavings}% avg`}</div>
                            </div>
                            <div style="font-size: 1.5rem;">⬆️</div>
                        </div>
                    </div>
                `;
            }
            
            html += '</div>';
            
            // Add motivational message
            if (yourUser) {
                const toTop10 = top10[9].count - yourUser.count;
                const toTop1 = users[0].count - yourUser.count;
                
                if (yourUser.rank > 10 && toTop10 > 0) {
                    html += `
                        <div style="margin-top: 1.5rem; text-align: center; color: var(--text-secondary); font-size: 0.9rem;">
                            💪 Just ${toTop10} more ${toTop10 === 1 ? 'scan' : 'scans'} to reach top 10!
                        </div>
                    `;
                } else if (yourUser.rank > 1) {
                    html += `
                        <div style="margin-top: 1.5rem; text-align: center; color: var(--text-secondary); font-size: 0.9rem;">
                            🏆 ${toTop1} ${toTop1 === 1 ? 'scan' : 'scans'} away from #1!
                        </div>
                    `;
                }
            } else {
                html += `
                    <div style="margin-top: 1.5rem; text-align: center; color: var(--text-secondary); font-size: 0.9rem;">
                        Scan an item to join the leaderboard! 🚀
                    </div>
                `;
            }
            
            document.getElementById('leaderboardContent').innerHTML = html;
        }

        // Leaderboard button handlers
        document.getElementById('leaderboardBtn').addEventListener('click', () => {
            document.getElementById('leaderboardModal').classList.remove('hidden');
            loadLeaderboard('volume');
        });

        document.getElementById('viewLeaderboardBtn').addEventListener('click', () => {
            document.getElementById('leaderboardModal').classList.remove('hidden');
            loadLeaderboard('volume');
        });

        document.getElementById('closeLeaderboard').addEventListener('click', () => {
            document.getElementById('leaderboardModal').classList.add('hidden');
        });

        // Tab switching
        document.querySelectorAll('.leaderboard-tab').forEach(tab => {
            tab.addEventListener('click', (e) => {
                // Remove active from all
                document.querySelectorAll('.leaderboard-tab').forEach(t => {
                    t.classList.remove('active');
                    t.style.background = 'rgba(255, 255, 255, 0.1)';
                    t.style.color = 'white';
                });
                
                // Add active to clicked
                e.target.classList.add('active');
                
                // Load appropriate leaderboard
                const type = e.target.dataset.tab;
                loadLeaderboard(type);
            });
        });
    </script>
</body>
</html>
